<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">R3K signal console</title>
  <desc id="desc">A retro arcade-style control console for R3K, a personal AI assistant, with buttons, meters, boot logs, and playful system labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#10131f"/>
      <stop offset="0.46" stop-color="#151b2d"/>
      <stop offset="1" stop-color="#081c1b"/>
    </linearGradient>
    <linearGradient id="cabinet" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#202945"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#122522"/>
      <stop offset="1" stop-color="#06110f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#63f6c8" stop-opacity="0.42"/>
      <stop offset="0.52" stop-color="#5dd3ff" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 0H8" stroke="#b7fff0" stroke-opacity="0.09" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#64ffd0" flood-opacity="0.75"/>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .tiny { font-size: 18px; letter-spacing: 1px; }
      .label { font-size: 22px; font-weight: 700; letter-spacing: 2px; }
      .panelText { font-size: 24px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <rect width="1200" height="620" fill="url(#grid)"/>
  <circle cx="980" cy="120" r="260" fill="url(#glow)"/>
  <circle cx="170" cy="540" r="220" fill="#ffca58" opacity="0.08"/>
  <circle cx="1040" cy="510" r="150" fill="#ff5c8a" opacity="0.08"/>

  <g filter="url(#softShadow)">
    <path d="M120 78H1080L1134 542H66L120 78Z" fill="url(#cabinet)" stroke="#5dd3ff" stroke-opacity="0.35" stroke-width="3"/>
    <path d="M151 112H1049L1087 506H113L151 112Z" fill="#0d1220" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  </g>

  <g>
    <rect x="186" y="145" width="548" height="262" rx="18" fill="url(#screen)" stroke="#64ffd0" stroke-width="3"/>
    <rect x="198" y="157" width="524" height="238" rx="12" fill="url(#scan)"/>
    <text x="224" y="204" class="mono tiny" fill="#64ffd0">SIGNAL LOCK: PERSONAL AI ASSISTANT</text>
    <text x="224" y="274" class="sans" font-size="98" font-weight="900" letter-spacing="5" fill="#f6fff9" filter="url(#textGlow)">R3K</text>
    <text x="229" y="323" class="mono" font-size="26" fill="#b7fff0">IDEA ARCADE // CLARITY MACHINE</text>
    <text x="229" y="362" class="mono" font-size="20" fill="#ffd166">INSERT IMPOSSIBLE LITTLE IDEA</text>
    <path d="M224 229H690" stroke="#64ffd0" stroke-width="2" stroke-opacity="0.45"/>
    <path d="M224 341H690" stroke="#64ffd0" stroke-width="2" stroke-opacity="0.18"/>
  </g>

  <g>
    <rect x="772" y="145" width="240" height="82" rx="14" fill="#191f34" stroke="#ffca58" stroke-width="2"/>
    <text x="794" y="178" class="mono tiny" fill="#ffca58">CURRENT MODE</text>
    <text x="794" y="211" class="mono panelText" fill="#fff3c4">CURIOUS</text>

    <rect x="772" y="246" width="240" height="82" rx="14" fill="#191f34" stroke="#5dd3ff" stroke-width="2"/>
    <text x="794" y="279" class="mono tiny" fill="#5dd3ff">OUTPUT</text>
    <text x="794" y="312" class="mono panelText" fill="#d6f6ff">RUNNABLE</text>

    <rect x="772" y="347" width="240" height="82" rx="14" fill="#191f34" stroke="#ff5c8a" stroke-width="2"/>
    <text x="794" y="380" class="mono tiny" fill="#ff8aae">RESERVE</text>
    <text x="794" y="413" class="mono panelText" fill="#ffd6e2">TINY CHAOS</text>
  </g>

  <g>
    <text x="184" y="462" class="mono label" fill="#f6fff9">CONTROL BANK</text>
    <g transform="translate(184 483)">
      <rect x="0" y="0" width="150" height="52" rx="26" fill="#64ffd0"/>
      <text x="75" y="34" text-anchor="middle" class="mono" font-size="18" font-weight="800" fill="#08211c">MAKE REAL</text>
    </g>
    <g transform="translate(354 483)">
      <rect x="0" y="0" width="168" height="52" rx="26" fill="#ffca58"/>
      <text x="84" y="34" text-anchor="middle" class="mono" font-size="18" font-weight="800" fill="#2a1b00">MAKE WEIRD</text>
    </g>
    <g transform="translate(542 483)">
      <rect x="0" y="0" width="134" height="52" rx="26" fill="#5dd3ff"/>
      <text x="67" y="34" text-anchor="middle" class="mono" font-size="18" font-weight="800" fill="#061a25">CLARITY</text>
    </g>
  </g>

  <g>
    <text x="772" y="474" class="mono label" fill="#f6fff9">SIGNAL METERS</text>
    <text x="772" y="509" class="mono tiny" fill="#b7fff0">WONDER</text>
    <rect x="880" y="492" width="150" height="16" rx="8" fill="#ffffff" opacity="0.13"/>
    <rect x="880" y="492" width="126" height="16" rx="8" fill="#64ffd0"/>
    <text x="772" y="542" class="mono tiny" fill="#ffd166">CLARITY</text>
    <rect x="880" y="525" width="150" height="16" rx="8" fill="#ffffff" opacity="0.13"/>
    <rect x="880" y="525" width="138" height="16" rx="8" fill="#ffca58"/>
    <text x="772" y="575" class="mono tiny" fill="#ff9dbb">MISCHIEF</text>
    <rect x="880" y="558" width="150" height="16" rx="8" fill="#ffffff" opacity="0.13"/>
    <rect x="880" y="558" width="104" height="16" rx="8" fill="#ff5c8a"/>
  </g>

  <g opacity="0.8">
    <circle cx="96" cy="112" r="8" fill="#64ffd0"/>
    <circle cx="1104" cy="112" r="8" fill="#ffca58"/>
    <circle cx="96" cy="512" r="8" fill="#ff5c8a"/>
    <circle cx="1104" cy="512" r="8" fill="#5dd3ff"/>
  </g>
</svg>
